# Despliegue del daemon de Magnus en un host con GPU NVIDIA.
#
# El nombre es transparente a propósito: "magnus-daemon". Magnus es una carga de
# trabajo legítima y nombrada con claridad; no se disfraza de otro servicio.
# Ejecutar solo en servidores donde se tenga autorización para correr cargas.
#
# Requisitos del host: Docker + NVIDIA Container Toolkit (para --gpus).
# Uso:  docker compose -f deploy/docker-compose.yml up -d --build

services:
  magnus-daemon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: magnus-daemon
    restart: unless-stopped
    # Por defecto se publica SOLO en loopback. Para que los clientes Flutter de
    # la red lleguen, cambia a "8420:8420" y protege con auth + firewall.
    ports:
      - "127.0.0.1:8420:8420"
    volumes:
      - magnus-data:/app/data        # memoria, vector store, skills
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1                # nº de GPUs (sube para multi-GPU)
              capabilities: [gpu]

volumes:
  magnus-data:
